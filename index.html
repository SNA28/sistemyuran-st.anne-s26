        }
        body { 
            background: #f0f2f5; /* Latar belakang luar yang cerah */
            color: var(--deep-navy); 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            padding: 25px;
        }

        .header-section {
            background: var(--deep-navy);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);

            display: flex; align-items: center; justify-content: center;

        .school-badge { width: 80px; height: auto; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        .header-text h1 { font-size: 2.2rem; margin: 0; color: #ffffff; font-weight: 800; letter-spacing: 1px; }
        
        /* STAT CARDS DALAM HEADER */
        .stat-card-dark {
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 15px; text-align: center;
        }
        .stat-value-light { font-size: 1.4rem; font-weight: 700; color: var(--royal-gold); }

            background: var(--soft-white);

            padding: 25px;

            color: var(--deep-navy); /* Tulisan Dark Blue */

    selKelas.onchange = function() {
        const k = this.value;
        selNama.innerHTML = '<option value="">-- Pilih Murid --</option>';
        if(rawData[k]) rawData[k].forEach(n => selNama.innerHTML += `<option value="${n}">${n}</option>`);
    };

    let currentTransactions = [];
    document.getElementById('btnSimpan').onclick = function() {
        const n = selNama.value, k = selKelas.value, a = document.getElementById('selAmaun').value;
        if(!n) return alert("Sila pilih murid!");
        push(dbRef, { nama: n, kelas: k, amaun: parseInt(a), ts: new Date().getTime() });
    };

    onValue(dbRef, (snap) => {
        const data = snap.val() || {};
        currentTransactions = Object.values(data);
        const sudahNama = new Set(currentTransactions.map(d => d.nama));
        
        let total = 0, pibg = 0, extra = 0;
        const sudahHTML = [...currentTransactions].reverse().map(item => {
            total += item.amaun;
            if(item.amaun === 170) { pibg += 100; extra += 70; }
            else if(item.amaun === 100) { pibg += 100; }
            else { extra += 70; }
            return `<tr><td><span class="fw-bold">${item.nama}</span><br><small class="text-muted">${item.kelas}</small></td><td class="text-end text-success fw-bold">RM ${item.amaun}</td></tr>`;
        }).join('');

        let belumCount = 0, belumHTML = "";
        Object.keys(rawData).forEach(kls => {
            rawData[kls].forEach(nama => {
                if(!sudahNama.has(nama)) {
                    belumCount++;
                    belumHTML += `<tr><td>${nama}<br><small class="text-muted">${kls}</small></td><td class="text-end text-danger small">PENDING</td></tr>`;
                }
            });
        });

        document.getElementById('listSudah').innerHTML = sudahHTML;
        document.getElementById('listBelum').innerHTML = belumHTML;
        document.getElementById('totalSemasa').innerText = "RM " + total.toLocaleString();
        document.getElementById('totalPIBG').innerText = "RM " + pibg.toLocaleString();
        document.getElementById('totalExtra').innerText = "RM " + extra.toLocaleString();
        document.getElementById('bilBayarTotal').innerText = sudahNama.size;
        document.getElementById('countBelum').innerText = belumCount;
        
        document.getElementById('barTotal').style.width = ((total / 69020) * 100) + "%";
        myChart.data.datasets[0].data = [sudahNama.size, belumCount];
        myChart.update();
