        table { font-size: 0.85rem; color: white !important; }
        .btn-delete { color: var(--none-red); cursor: pointer; display: none; text-decoration: none; }

    // Filter Nama Ikut Kelas
    document.getElementById('selKelas').onchange = function() {
        const kls = this.value;
        const selN = document.getElementById('selNama');
        selN.innerHTML = '<option value="">-- Pilih Nama --</option>';
        if (rawData[kls]) {
            rawData[kls].sort().forEach(nama => selN.innerHTML += `<option value="${nama}">${nama}</option>`);
        }
    };

    // Login Admin
    document.getElementById('btnAdminLogin').onclick = function() {
        if (!isAdmin) {
            const pass = prompt("Sila masukkan Kata Laluan Admin:");
            if (pass === adminPass) {
                isAdmin = true;
                this.innerHTML = '<i class="fas fa-sign-out-alt me-2"></i>Logout Admin';
                this.classList.replace('btn-outline-light', 'btn-danger');
                document.body.classList.add('admin-active');
                document.getElementById('adminBadge').classList.remove('d-none');
                document.querySelectorAll('.admin-col').forEach(el => el.classList.remove('d-none'));
                refreshList();
            } else { alert("Kata laluan salah!"); }
        } else { location.reload(); }
    };

    // Simpan Data
    document.getElementById('btnSimpan').onclick = function() {
        const n = document.getElementById('selNama').value;
        const k = document.getElementById('selKelas').value;
        const a = document.getElementById('selAmaun').value;
        if(!n || !k) return alert("Sila pilih kelas dan nama!");

        push(dbRef, { 
            nama: n, kelas: k, amaun: parseInt(a), 
            tarikh: new Date().toLocaleString('ms-MY') 
        }).then(() => alert("Berjaya Disimpan!"));
    };

    let currentData = {};
    onValue(dbRef, (snap) => {
        currentData = snap.val() || {};
        refreshList();
    });

    // Paparan & Statistik Asing
    function refreshList() {
        const listBody = document.getElementById('listSudah');
        listBody.innerHTML = "";
        
        let totalKeseluruhan = 0;
        let totalPIBG = 0;
        let totalExtra = 0;
        
        const entries = Object.entries(currentData).reverse();
        
        entries.forEach(([id, item]) => {
            const amaun = parseInt(item.amaun);
            totalKeseluruhan += amaun;

            // Logik Pengasingan Tabung
            if (amaun === 170) { totalPIBG += 100; totalExtra += 70; }
            else if (amaun === 100) { totalPIBG += 100; }
            else if (amaun === 70) { totalExtra += 70; }

            listBody.innerHTML += `<tr>
                <td class="small opacity-50">${item.tarikh}</td>
                <td class="fw-bold">${item.nama}</td>
                <td>${item.kelas}</td>
                <td class="text-end text-success fw-bold">RM ${amaun}</td>
                <td class="text-center admin-col ${isAdmin ? '' : 'd-none'}">
                    <a class="btn-delete" onclick="padamRekod('${id}')"><i class="fas fa-trash-alt"></i></a>
                </td>
            </tr>`;
        });

        document.getElementById('totalSemasa').innerText = "RM " + totalKeseluruhan;
        document.getElementById('totalPIBG').innerText = "RM " + totalPIBG;
        document.getElementById('totalExtra').innerText = "RM " + totalExtra;
        document.getElementById('countSudah').innerText = entries.length + " Bayaran Diterima";
    }

    window.padamRekod = function(id) {
        if (confirm("Padam rekod ini?")) {
            remove(ref(db, `yuran_2026/${id}`));
        }
    };

    document.getElementById('btnDownload').onclick = function() {
        let csv = "\uFEFFTarikh,Nama,Kelas,Amaun\n";
        Object.values(currentData).forEach(r => {
            csv += `"${r.tarikh}","${r.nama}","${r.kelas}","${r.amaun}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'Laporan_Yuran_PIBG_2026.csv'; a.click();
    };
</script>
